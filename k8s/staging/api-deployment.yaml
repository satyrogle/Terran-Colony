apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudcommander-api
  namespace: cloudcommander-staging
  labels:
    app: cloudcommander
    component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloudcommander
      component: api
  template:
    metadata:
      labels:
        app: cloudcommander
        component: api
    spec:
      initContainers:
        - name: run-migrations
          image: jakeyy8/cloudcommander:staging
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "migrations.run"]
          envFrom:
            - secretRef:
                name: cloudcommander-secrets
            - configMapRef:
                name: cloudcommander-config
      containers:
        - name: api
          image: jakeyy8/cloudcommander:staging
          imagePullPolicy: IfNotPresent
          command: ["uvicorn"]
          args: ["app.main:app", "--host", "0.0.0.0", "--port", "8080"]
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: cloudcommander-secrets
            - configMapRef:
                name: cloudcommander-config
          readinessProbe:
            httpGet:
              path: /docs
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /docs
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
