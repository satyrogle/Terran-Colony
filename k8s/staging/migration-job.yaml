apiVersion: batch/v1
kind: Job
metadata:
  name: cloudcommander-db-migrate
  namespace: cloudcommander-staging
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: jakeyy8/cloudcommander-api:staging
          command: ["python", "-m", "migrations.run"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: cloudcommander-secrets
                  key: DATABASE_URL
